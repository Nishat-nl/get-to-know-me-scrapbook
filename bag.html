<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>what's in my bag? 👜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <script src="bag_images.js"></script>
  <style>
    .container{max-width:700px;margin:0 auto;padding:0 1rem 4rem}

    /* Bag selector */
    .bag-selector{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center;margin:1.5rem 0}
    .bag-tab{background:var(--paper);border:2px solid transparent;border-radius:10px;padding:.6rem 1rem;cursor:pointer;font-family:'Lora',serif;font-size:.82rem;color:var(--text-light);transition:all .2s;box-shadow:1px 1px 6px rgba(139,111,94,.1)}
    .bag-tab:hover{border-color:var(--dusty-pink);transform:translateY(-2px)}
    .bag-tab.active{border-color:var(--rose);background:var(--blush);color:var(--text)}
    .bag-tab img{width:36px;height:36px;object-fit:contain;display:block;margin:0 auto .3rem}

    /* Scene */
    .bag-scene{text-align:center;margin:1.5rem 0;position:relative;min-height:280px}
    .bag-wrapper{display:inline-block;cursor:pointer;position:relative;transition:all .3s;transform-origin:bottom center}
    .bag-wrapper:hover .bag-img{filter:drop-shadow(0 10px 20px rgba(139,111,94,.3));transform:translateY(-4px)}

    .bag-img{
      width:200px;height:200px;object-fit:contain;
      filter:drop-shadow(0 6px 18px rgba(139,111,94,.2));
      transition:all .3s;
      display:block;margin:0 auto;
    }

    /* Shake animation */
    @keyframes bagShake{
      0%{transform:rotate(0deg) translateY(0)}
      10%{transform:rotate(-8deg) translateY(-10px)}
      20%{transform:rotate(8deg) translateY(-15px)}
      30%{transform:rotate(-6deg) translateY(-10px)}
      40%{transform:rotate(6deg) translateY(-12px)}
      50%{transform:rotate(-4deg) translateY(-8px)}
      60%{transform:rotate(180deg) translateY(-5px)}
      70%{transform:rotate(185deg) translateY(0)}
      80%{transform:rotate(180deg) translateY(0)}
      90%{transform:rotate(180deg) translateY(0)}
      100%{transform:rotate(180deg) translateY(0)}
    }
    .bag-wrapper.shaking .bag-img{animation:bagShake .9s cubic-bezier(.36,.07,.19,.97) forwards;transform-origin:center bottom}
    .bag-wrapper.flipped .bag-img{transform:rotate(180deg)}

    .bag-name{font-family:'Dancing Script',cursive;font-size:1.6rem;color:var(--warm-brown);margin:.5rem 0 .2rem}
    .bag-hint{font-style:italic;font-size:.82rem;color:var(--text-light);animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

    /* Cloth/fabric area */
    .cloth-area{
      display:none;position:relative;
      margin:0 auto;
      max-width:600px;
      min-height:220px;
      border-radius:16px;
      padding:1.5rem 1rem;
      overflow:visible;
    }
    .cloth-area.visible{display:block;animation:clothReveal .5s ease}
    @keyframes clothReveal{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* Fabric texture */
    .cloth-fabric{
      position:absolute;inset:0;border-radius:16px;
      background:
        repeating-linear-gradient(0deg,rgba(232,180,184,.12) 0px,rgba(232,180,184,.12) 1px,transparent 1px,transparent 12px),
        repeating-linear-gradient(90deg,rgba(232,180,184,.12) 0px,rgba(232,180,184,.12) 1px,transparent 1px,transparent 12px),
        var(--paper-dark);
      box-shadow:inset 0 2px 8px rgba(139,111,94,.1),0 4px 20px rgba(139,111,94,.1);
      border:2px solid rgba(232,180,184,.3);
    }
    .cloth-label{position:relative;z-index:2;text-align:center;font-family:'Dancing Script',cursive;font-size:1.3rem;color:var(--text-light);margin-bottom:1rem}

    /* Items on cloth */
    .items-container{position:relative;z-index:2;display:flex;flex-wrap:wrap;gap:.8rem;justify-content:center;padding:.5rem}

    .item-on-cloth{
      position:relative;cursor:pointer;
      animation:itemFall .5s cubic-bezier(.34,1.56,.64,1) both;
      transform-origin:center top;
    }
    @keyframes itemFall{
      0%{opacity:0;transform:translateY(-80px) rotate(var(--rot)) scale(.3)}
      60%{transform:translateY(5px) rotate(var(--rot)) scale(1.05)}
      100%{opacity:1;transform:translateY(0) rotate(var(--rot)) scale(1)}
    }

    .item-emoji-display{
      font-size:2.4rem;
      display:flex;align-items:center;justify-content:center;
      width:60px;height:60px;
      background:white;border-radius:50%;
      box-shadow:0 3px 10px rgba(139,111,94,.15);
      transition:transform .2s;
      position:relative;
    }
    .item-on-cloth:hover .item-emoji-display{transform:rotate(var(--rot)) scale(1.15) !important}
    .item-name-label{font-size:.68rem;color:var(--text-light);text-align:center;margin-top:.3rem;font-style:italic;max-width:70px;line-height:1.2}

    /* Tooltip on tap */
    .item-tooltip{
      position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
      background:var(--warm-brown);color:white;
      border-radius:10px;padding:.5rem .8rem;
      font-size:.78rem;line-height:1.4;
      white-space:nowrap;max-width:180px;white-space:normal;
      box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:20;
      pointer-events:none;text-align:center;
      animation:tooltipIn .2s ease;
    }
    @keyframes tooltipIn{from{opacity:0;transform:translateX(-50%) translateY(4px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .item-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--warm-brown)}

    .reset-btn-area{text-align:center;margin-top:1rem}
  </style>
</head>
<body>
  <div class="page-header">
    <a href="index.html" class="back-btn">← back home</a>
    <div class="page-title">what's in my bag?</div>
    <div class="page-sub">click the bag to see what tumbles out ✦</div>
  </div>
  <div class="washi"></div>

  <div class="container">
    <div class="bag-selector" id="bagSelector"></div>

    <div class="bag-scene" id="bagScene">
      <div class="bag-wrapper" id="bagWrapper" onclick="shakeBag()">
        <img class="bag-img" id="bagImg" src="" alt="my bag"/>
      </div>
      <div class="bag-name" id="bagName"></div>
      <div class="bag-hint" id="bagHint">tap to open ✦</div>
    </div>

    <div class="cloth-area" id="clothArea">
      <div class="cloth-fabric"></div>
      <div class="cloth-label">✦ everything that tumbled out ✦</div>
      <div class="items-container" id="itemsContainer"></div>
    </div>
    <div class="reset-btn-area" id="resetArea" style="display:none">
      <button class="btn btn-outline" onclick="resetBag()">put it back ✦</button>
    </div>
  </div>

  <script>
    const BAG_NAMES={bag_1:'pink baguette',bag_2:'blue chain bag',bag_3:'pink handbag',bag_4:'butterfly bag',bag_5:'backpack'};
    let activeBagId=null;
    let shaking=false;
    let activeTooltip=null;

    function getDefaultBags(){
      return[
        {id:'bag_1',image:'bag_1',name:'everyday bag',items:[
          {emoji:'🔑',name:'keys',note:'with a little mushroom keychain'},
          {emoji:'📱',name:'phone',note:'always on low battery somehow'},
          {emoji:'💄',name:'tinted lip balm',note:'my most essential item'},
          {emoji:'📓',name:'mini notebook',note:'for thoughts & doodles'},
          {emoji:'🎧',name:'earphones',note:'tangled, always'},
          {emoji:'🌸',name:'hand cream',note:'rose scented obviously'}
        ]}
      ];
    }

    function getBags(){
      const stored=localStorage.getItem('scrapbook_bags');
      return stored?JSON.parse(stored):getDefaultBags();
    }

    function renderBagSelector(){
      const bags=getBags();
      const sel=document.getElementById('bagSelector');
      sel.innerHTML='';
      if(bags.length<=1){sel.style.display='none';return}
      sel.style.display='flex';
      bags.forEach(bag=>{
        const btn=document.createElement('div');
        btn.className='bag-tab'+(bag.id===activeBagId?' active':'');
        const imgKey=bag.image||'bag_1';
        const imgSrc=typeof BAG_IMAGES!=='undefined'&&BAG_IMAGES[imgKey]?BAG_IMAGES[imgKey]:`${imgKey}.png`;
        btn.innerHTML=`<img src="${imgSrc}" alt="${bag.name}"/>${bag.name}`;
        btn.onclick=()=>loadBag(bag.id);
        sel.appendChild(btn);
      });
    }

    function loadBag(id){
      const bags=getBags();
      const bag=bags.find(b=>b.id===id)||bags[0];
      if(!bag)return;
      activeBagId=bag.id;
      shaking=false;

      // Set bag image
      const imgKey=bag.image||'bag_1';
      const imgSrc=typeof BAG_IMAGES!=='undefined'&&BAG_IMAGES[imgKey]?BAG_IMAGES[imgKey]:`${imgKey}.png`;
      document.getElementById('bagImg').src=imgSrc;
      document.getElementById('bagName').textContent=bag.name;
      document.getElementById('bagHint').textContent='tap to open ✦';

      const wrapper=document.getElementById('bagWrapper');
      wrapper.className='bag-wrapper';

      document.getElementById('clothArea').classList.remove('visible');
      document.getElementById('resetArea').style.display='none';
      document.getElementById('itemsContainer').innerHTML='';

      renderBagSelector();
    }

    function shakeBag(){
      if(shaking)return;
      shaking=true;
      const wrapper=document.getElementById('bagWrapper');
      const hint=document.getElementById('bagHint');
      hint.textContent='watch! 🌸';
      wrapper.classList.add('shaking');

      // After shake animation, show items falling
      setTimeout(()=>{
        wrapper.classList.remove('shaking');
        wrapper.classList.add('flipped');
        hint.textContent='tap an item to learn more ✦';

        const bags=getBags();
        const bag=bags.find(b=>b.id===activeBagId)||bags[0];
        if(!bag)return;

        // Slight delay then show cloth
        setTimeout(()=>{
          document.getElementById('clothArea').classList.add('visible');
          document.getElementById('resetArea').style.display='block';
          renderItemsOnCloth(bag.items||[]);
        },200);
      },950);
    }

    function renderItemsOnCloth(items){
      const container=document.getElementById('itemsContainer');
      container.innerHTML='';
      if(!items.length){
        container.innerHTML='<div style="font-style:italic;color:var(--text-light);font-size:.9rem;text-align:center;padding:1rem">the bag is empty... 🌿</div>';
        return;
      }
      items.forEach((item,i)=>{
        const rot=(Math.random()*20-10).toFixed(1);
        const el=document.createElement('div');
        el.className='item-on-cloth';
        el.style.cssText=`--rot:${rot}deg;animation-delay:${i*.08+.1}s`;
        el.innerHTML=`
          <div class="item-emoji-display" style="transform:rotate(${rot}deg)">${item.emoji||'✨'}</div>
          <div class="item-name-label">${item.name}</div>
        `;
        el.onclick=(e)=>toggleTooltip(el,item,e);
        container.appendChild(el);
      });
    }

    function toggleTooltip(el,item,e){
      e.stopPropagation();
      // Remove any existing tooltip
      if(activeTooltip){
        activeTooltip.remove();
        activeTooltip=null;
        if(activeTooltip===el._tooltip)return;
      }
      if(!item.note)return;
      const tip=document.createElement('div');
      tip.className='item-tooltip';
      tip.innerHTML=`<strong>${item.name}</strong><br>${item.note}`;
      el.appendChild(tip);
      activeTooltip=tip;
      el._tooltip=tip;
    }

    document.addEventListener('click',()=>{
      if(activeTooltip){activeTooltip.remove();activeTooltip=null;}
    });

    function resetBag(){
      shaking=false;
      const wrapper=document.getElementById('bagWrapper');
      wrapper.className='bag-wrapper';
      document.getElementById('clothArea').classList.remove('visible');
      document.getElementById('resetArea').style.display='none';
      document.getElementById('bagHint').textContent='tap to open ✦';
    }

    // Init
    const bags=getBags();
    activeBagId=bags[0]?.id;
    if(bags[0]){
      const imgKey=bags[0].image||'bag_1';
      const imgSrc=typeof BAG_IMAGES!=='undefined'&&BAG_IMAGES[imgKey]?BAG_IMAGES[imgKey]:`${imgKey}.png`;
      document.getElementById('bagImg').src=imgSrc;
      document.getElementById('bagName').textContent=bags[0].name;
    }
    renderBagSelector();
  </script>
</body>
</html>
