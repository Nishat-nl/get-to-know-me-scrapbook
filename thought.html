<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>thought of the day 🌙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Lora:ital,wght@0,400;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <style>
    .container{max-width:600px;margin:0 auto;padding:0 1.2rem 4rem}
    .thought-card{
      background:var(--paper);border-radius:8px;padding:2.5rem 2.5rem 3rem;
      margin:2rem 0;position:relative;
      box-shadow:4px 4px 0 rgba(139,111,94,.1),8px 8px 24px rgba(139,111,94,.08);
      transform:rotate(-.5deg);
    }
    .thought-card::before{content:'';position:absolute;top:-10px;left:40%;transform:translateX(-50%) rotate(-2deg);width:80px;height:20px;background:rgba(232,180,184,.65);border-radius:3px}
    .thought-card::after{content:'';position:absolute;inset:2.5rem;background:repeating-linear-gradient(transparent,transparent 27px,rgba(217,140,140,.13) 27px,rgba(217,140,140,.13) 28px);pointer-events:none}
    .thought-date{font-size:.8rem;color:var(--text-light);font-style:italic;margin-bottom:1.5rem;position:relative;z-index:1}
    .thought-text{font-family:'Playfair Display',serif;font-size:1.2rem;line-height:1.9;color:var(--text);position:relative;z-index:1;font-style:italic;white-space:pre-wrap}
    .thought-mood{margin-top:1.5rem;font-size:1.6rem;position:relative;z-index:1}
    .thought-sig{font-family:'Dancing Script',cursive;font-size:1.3rem;color:var(--rose);margin-top:1.2rem;position:relative;z-index:1;text-align:right}
    .no-thought{text-align:center;padding:3rem 1rem;font-style:italic;color:var(--text-light);font-size:1.05rem}
    .archive-toggle{text-align:center;margin:2rem 0 1rem}
    .archive-btn{background:none;border:1.5px dashed var(--dusty-pink);border-radius:20px;padding:.5rem 1.5rem;cursor:pointer;font-family:'Lora',serif;font-size:.9rem;font-style:italic;color:var(--text-light);transition:all .2s}
    .archive-btn:hover{border-color:var(--rose);color:var(--rose)}
    .archive-section{display:none}
    .archive-section.open{display:block;animation:fadeIn .4s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .archive-title{font-family:'Dancing Script',cursive;font-size:1.8rem;color:var(--warm-brown);margin-bottom:1rem;text-align:center}
    .archive-item{background:var(--paper);border-radius:6px;padding:1.2rem 1.5rem;margin-bottom:.8rem;box-shadow:2px 2px 8px rgba(139,111,94,.07);cursor:pointer;transition:transform .2s;border-left:3px solid var(--dusty-pink)}
    .archive-item:hover{transform:translateX(4px);border-left-color:var(--rose)}
    .archive-item-date{font-size:.75rem;color:var(--text-light);font-style:italic;margin-bottom:.4rem}
    .archive-item-preview{font-family:'Playfair Display',serif;font-style:italic;font-size:.95rem;color:var(--text);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .archive-thought-text{font-family:'Playfair Display',serif;font-style:italic;font-size:1.05rem;line-height:1.8;color:var(--text);white-space:pre-wrap}
    .modal-title{font-family:'Dancing Script',cursive;font-size:1.6rem;color:var(--rose);margin-bottom:.3rem}
    .modal-date{font-size:.8rem;font-style:italic;color:var(--text-light);margin-bottom:1.2rem}
  </style>
</head>
<body>
  <div class="page-header">
    <a href="index.html" class="back-btn">← back home</a>
    <div class="page-title">thought of the day</div>
    <div class="page-sub">one little thought, just for today 🌙</div>
  </div>
  <div class="washi lavender"></div>
  <div class="container">
    <div id="todayThought"></div>
    <div class="archive-toggle">
      <button class="archive-btn" onclick="toggleArchive()">✦ visit the thought archive ✦</button>
    </div>
    <div class="archive-section" id="archiveSection">
      <div class="archive-title">past thoughts 🍂</div>
      <div id="archiveList"></div>
    </div>
  </div>
  <div class="modal-overlay" id="archiveModal">
    <div class="modal">
      <button class="modal-close" onclick="document.getElementById('archiveModal').classList.remove('open')">✕</button>
      <div id="archiveModalContent"></div>
    </div>
  </div>
  <script>
    const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

    async function loadSiteKV(key, fallback){
      const { data, error } = await window.supabaseClient
        .from('site_kv')
        .select('value')
        .eq('key', key)
        .maybeSingle();

      if(error){
        console.error(error);
        return fallback;
      }

      return data?.value ?? fallback;
    }

    function todayKey(){
      const d=new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    async function getThoughts(){
      return await loadSiteKV('thoughts', {});
    }

    function formatDate(key){
      const[y,m,d]=key.split('-');
      return `${MONTHS[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
    }

    async function renderToday(){
      const thoughts=await getThoughts();
      const key=todayKey();
      const today=thoughts[key];
      const c=document.getElementById('todayThought');

      if(!today){
        c.innerHTML=`<div class="no-thought"><div style="font-size:3rem;margin-bottom:1rem">🌙</div><div>I'm thoughtless today</div><div style="font-size:.8rem;margin-top:.5rem">check back later ✦</div></div>`;
        return;
      }

      c.innerHTML=`<div class="thought-card"><div class="thought-date">📅 ${formatDate(key)}</div><div class="thought-text">${today.text}</div>${today.mood?`<div class="thought-mood">${today.mood}</div>`:''}<div class="thought-sig">— nishat 🌸</div></div>`;
    }

    async function renderArchive(){
      const thoughts=await getThoughts();
      const todayK=todayKey();
      const list=document.getElementById('archiveList');
      const past=Object.entries(thoughts).filter(([k])=>k!==todayK).sort(([a],[b])=>b.localeCompare(a));

      if(!past.length){
        list.innerHTML='<div style="text-align:center;font-style:italic;color:var(--text-light);padding:1.5rem">no archived thoughts yet... ˚₊·</div>';
        return;
      }

      list.innerHTML='';
      past.forEach(([key,thought])=>{
        const item=document.createElement('div');
        item.className='archive-item';
        item.innerHTML=`<div class="archive-item-date">📅 ${formatDate(key)}</div><div class="archive-item-preview">${thought.text}</div>`;
        item.onclick=()=>{
          document.getElementById('archiveModalContent').innerHTML=`<div class="modal-title">thought of the day</div><div class="modal-date">📅 ${formatDate(key)}</div><div class="archive-thought-text">${thought.text}</div>${thought.mood?`<div style="font-size:1.5rem;margin-top:1rem">${thought.mood}</div>`:''}<div style="font-family:'Dancing Script',cursive;font-size:1.2rem;color:var(--rose);text-align:right;margin-top:1rem">— nishat 🌸</div>`;
          document.getElementById('archiveModal').classList.add('open');
        };
        list.appendChild(item);
      });
    }

    document.getElementById('archiveModal').addEventListener('click',function(e){
      if(e.target===this)this.classList.remove('open');
    });

    let archiveOpen=false;

    async function toggleArchive(){
      archiveOpen=!archiveOpen;
      const s=document.getElementById('archiveSection');
      if(archiveOpen){
        s.classList.add('open');
        await renderArchive();
      }else{
        s.classList.remove('open');
      }
    }

    renderToday();
  </script>
</body>
</html>
